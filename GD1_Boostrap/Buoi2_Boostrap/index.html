<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Bootstrap demo</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <!-- container: 
     cac phan tu trong containter ra giua man hinh -->
    <div class="container">
      <h1>Test container text</h1>
    </div>
    <!-- 1 dong(row) co tong = 12 
     1 dong co the chua nhieu cot 
      -->
    <div class="container">
      <div class="row">
        <!-- Moi thu nam trong cho nay => deu thuoc cung 1 dong -->
        <div class="col-8">
          <h1>Test col 6</h1>
        </div>
        <div class="col-1">
          <h1>Test col 6</h1>
        </div>
        <!-- Qua => xuong dong -->
        <div class="col-3">
          <h1>Test col 6</h1>
        </div>
      </div>
    </div>
    <div class="container">
      <div class="row">
        <div class="col-xl-3 col-lg-6">
          <h1>Text1</h1>
        </div>
        <div class="col-xl-3 col-lg-6">
          <h1>Text2</h1>
        </div>
        <div class="col-xl-3 col-lg-6">
          <h1>Text3</h1>
        </div>
        <div class="col-xl-3 col-lg-6">
          <h1>Text4</h1>
        </div>
      </div>
      <div class="row">
        <div class="col-9">
          <h1>Text5</h1>
        </div>
        <div class="col-3">
          <h1>Text6</h1>
        </div>
      </div>
    </div>

    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
